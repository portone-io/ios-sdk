name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Swift Package
    runs-on: macos-15
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
      with:
        xcode-version: latest-stable

    - name: Download iOS Platform
      run: |
        xcrun simctl list > /dev/null
        xcodebuild -downloadPlatform iOS

    - name: Build Swift Package
      run: xcodebuild build -scheme PortOneSdk -destination "generic/platform=iOS Simulator"

    - name: Build Release Mode
      run: xcodebuild build -scheme PortOneSdk -configuration Release -destination "generic/platform=iOS Simulator"
