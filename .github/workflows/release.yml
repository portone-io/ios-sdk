name: Release

on:
  push:
    branches: [ "main" ]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 태그 생성을 위해 GitHub Contents API에 쓰기 권한 필요
      actions: write  # changesets/action 내부 동작에 actions API 쓰기 권한 필요
      pull-requests: write  # changesets/action이 릴리즈 PR을 생성하기 위해 필요
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Setup pnpm
      uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: 24
    - name: Install Dependencies
      run: pnpm install
    - name: Create Release Pull Request or Publish
      id: changesets
      uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Push Tags
      if: ${{ steps.changesets.outputs.hasChangesets == 'false' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION=$(jq -r '.version' package.json)
        if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$VERSION" >/dev/null 2>&1; then
          echo "Tag $VERSION already exists on remote, skipping."
        else
          gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/tags/$VERSION" \
            -f sha="$GITHUB_SHA"
        fi
